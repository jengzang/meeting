<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐑 热力图</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><ellipse cx='16' cy='18' rx='11' ry='10' fill='%235a4a3a'/><circle cx='13' cy='13' r='4' fill='%235a4a3a'/><circle cx='16' cy='11.5' r='4.5' fill='%23665544'/><circle cx='19' cy='13' r='4' fill='%235a4a3a'/><ellipse cx='13' cy='10' rx='3' ry='2' fill='%23f7c5c5'/><ellipse cx='19' cy='10' rx='3' ry='2' fill='%23f7c5c5'/><circle cx='14' cy='18' r='3' fill='white'/><circle cx='18' cy='18' r='3' fill='white'/><circle cx='14.5' cy='17.5' r='1.5' fill='%231a1410'/><circle cx='18.5' cy='17.5' r='1.5' fill='%231a1410'/><circle cx='15.2' cy='16.5' r='0.6' fill='white'/><circle cx='19.2' cy='16.5' r='0.6' fill='white'/><ellipse cx='12.5' cy='20.5' rx='1.5' ry='1' fill='%23e8a0a0' opacity='0.5'/><ellipse cx='19.5' cy='20.5' rx='1.5' ry='1' fill='%23e8a0a0' opacity='0.5'/><ellipse cx='16' cy='19.5' rx='1.2' ry='0.8' fill='%232a2018'/></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/intro.css?v=2329aef" />
  <link rel="stylesheet" href="css/sheep.css?v=2329aef" />
</head>

<body>
  <!-- ── Intro Sheep ──────────────────────────────── -->
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-scene">
      <div class="intro-sparkle intro-sparkle-1"></div>
      <div class="intro-sparkle intro-sparkle-2"></div>
      <div class="intro-sparkle intro-sparkle-3"></div>
      <div class="intro-sparkle intro-sparkle-4"></div>
      <div class="intro-sparkle intro-sparkle-5"></div>
      <div class="intro-sparkle intro-sparkle-6"></div>
      <div class="intro-shadow"></div>
      <div class="intro-message" id="introMessage"></div>
      <svg class="intro-sheep" viewBox="0 0 200 220" width="200" height="220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="45%" cy="35%">
            <stop offset="0%" stop-color="#fffefb"/>
            <stop offset="70%" stop-color="#f5f0e8"/>
            <stop offset="100%" stop-color="#e8e0d4"/>
          </radialGradient>
          <radialGradient id="fluffGrad" cx="40%" cy="30%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f2ede5"/>
          </radialGradient>
          <radialGradient id="headGrad" cx="40%" cy="35%">
            <stop offset="0%" stop-color="#5a4a3a"/>
            <stop offset="100%" stop-color="#3d3026"/>
          </radialGradient>
          <radialGradient id="earInnerGrad" cx="50%" cy="50%">
            <stop offset="0%" stop-color="#f7c5c5"/>
            <stop offset="100%" stop-color="#e8a0a0"/>
          </radialGradient>
        </defs>

        <!-- Body cloud -->
        <g class="sheep-body-cloud">
          <!-- Fluff circles -->
          <circle cx="100" cy="130" r="42" fill="url(#bodyGrad)"/>
          <circle cx="70" cy="118" r="26" fill="url(#fluffGrad)"/>
          <circle cx="130" cy="118" r="26" fill="url(#fluffGrad)"/>
          <circle cx="82" cy="100" r="24" fill="url(#fluffGrad)"/>
          <circle cx="118" cy="100" r="24" fill="url(#fluffGrad)"/>
          <circle cx="100" cy="96" r="28" fill="url(#fluffGrad)"/>
          <circle cx="66" cy="130" r="20" fill="url(#fluffGrad)"/>
          <circle cx="134" cy="130" r="20" fill="url(#fluffGrad)"/>
          <circle cx="76" cy="142" r="18" fill="#ede6db"/>
          <circle cx="124" cy="142" r="18" fill="#ede6db"/>
          <circle cx="90" cy="148" r="16" fill="#e8e0d4"/>
          <circle cx="110" cy="148" r="16" fill="#e8e0d4"/>
        </g>

        <!-- Tail -->
        <g class="sheep-tail">
          <circle cx="56" cy="124" r="14" fill="url(#fluffGrad)"/>
          <circle cx="50" cy="118" r="9" fill="#ffffff"/>
        </g>

        <!-- Head -->
        <g class="sheep-head-group">
          <!-- Ears -->
          <g class="ear-left">
            <ellipse cx="78" cy="55" rx="15" ry="8" fill="url(#headGrad)" transform="rotate(-32 78 55)"/>
            <ellipse cx="78" cy="55" rx="9" ry="5" fill="url(#earInnerGrad)" transform="rotate(-32 78 55)"/>
          </g>
          <g class="ear-right">
            <ellipse cx="122" cy="55" rx="15" ry="8" fill="url(#headGrad)" transform="rotate(32 122 55)"/>
            <ellipse cx="122" cy="55" rx="9" ry="5" fill="url(#earInnerGrad)" transform="rotate(32 122 55)"/>
          </g>

          <!-- Head shape -->
          <ellipse cx="100" cy="72" rx="30" ry="28" fill="url(#headGrad)"/>

          <!-- Fluffy top of head -->
          <circle cx="88" cy="50" r="11" fill="#5a4a3a"/>
          <circle cx="100" cy="46" r="12" fill="#665544"/>
          <circle cx="112" cy="50" r="11" fill="#5a4a3a"/>

          <!-- Eyes -->
          <g class="eye-blink">
            <circle cx="88" cy="70" r="7.5" fill="white"/>
            <circle cx="112" cy="70" r="7.5" fill="white"/>
            <circle cx="89" cy="69" r="4" fill="#1a1410"/>
            <circle cx="113" cy="69" r="4" fill="#1a1410"/>
            <!-- Catchlights -->
            <circle cx="91.5" cy="67" r="1.8" fill="white"/>
            <circle cx="87" cy="71" r="0.9" fill="white"/>
            <circle cx="115.5" cy="67" r="1.8" fill="white"/>
            <circle cx="111" cy="71" r="0.9" fill="white"/>
          </g>

          <!-- Rosy cheeks -->
          <ellipse cx="78" cy="78" rx="6" ry="4" fill="#e8a0a0" opacity="0.45"/>
          <ellipse cx="122" cy="78" rx="6" ry="4" fill="#e8a0a0" opacity="0.45"/>

          <!-- Nose -->
          <ellipse cx="100" cy="76" rx="5" ry="3.5" fill="#2a2018"/>

          <!-- Mouth -->
          <path d="M96 80.5 Q100 85 104 80.5" stroke="#2a2018" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Legs -->
        <rect class="leg-back-left" x="74" y="158" width="10" height="22" rx="5" fill="#4a3c30"/>
        <rect class="leg-back-right" x="116" y="158" width="10" height="22" rx="5" fill="#4a3c30"/>
        <rect class="leg-front-left" x="84" y="156" width="10" height="24" rx="5" fill="#3d3026"/>
        <rect class="leg-front-right" x="106" y="156" width="10" height="24" rx="5" fill="#3d3026"/>

        <!-- Tiny hooves -->
        <ellipse class="leg-front-left" cx="89" cy="180" rx="5.5" ry="3" fill="#2a2018"/>
        <ellipse class="leg-front-right" cx="111" cy="180" rx="5.5" ry="3" fill="#2a2018"/>
        <ellipse class="leg-back-left" cx="79" cy="180" rx="5.5" ry="3" fill="#2a2018"/>
        <ellipse class="leg-back-right" cx="121" cy="180" rx="5.5" ry="3" fill="#2a2018"/>
      </svg>
    </div>
  </div>

  <div class="card">
    <div class="header">
      <div>
        <div class="title">热力图</div>
        <div class="subtitle">2026.02.16 — 2026.06.21；一周一列，周一到周日。</div>
        <a href="index.html" class="nav-link">🏠 基地</a>
        <a href="map.html" class="nav-link">地图 →</a>
      </div>

      <div class="controls">
        <select id="modeSelect">
          <option value="shape">模式 1：形状填充</option>
          <option value="depth">模式 2：颜色深度</option>
        </select>

        <select id="themeSelect">
          <option value="githubGreen">GitHub 绿</option>
          <option value="oceanBlue">海洋蓝</option>
          <option value="cyberCyan">炫酷青</option>
          <option value="warmOrange">温暖橙</option>
          <option value="rosePink">玫瑰粉</option>
          <option value="violetPurple">紫罗兰</option>
        </select>
      </div>
    </div>

    <div class="heatmap-wrap">
      <div id="calendar" class="calendar"></div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="month-ratio" id="monthRatio"></div>

    <div class="total-pie-section" id="totalPieSection"></div>

    <div class="monthly-pie-section" id="monthlyPieSection"></div>
  </div>

  <script>
    (function() {
      var overlay = document.getElementById('introOverlay');
      var msgEl = document.getElementById('introMessage');
      function hide() {
        overlay && overlay.classList.add('hide');
        if (msgEl) msgEl.textContent = '';
      }
      setTimeout(hide, 2000);
      overlay && overlay.addEventListener('click', hide);
      window.showIntroSheep = function(msg, duration) {
        if (!overlay) return;
        if (msgEl && msg) msgEl.textContent = msg;
        overlay.classList.remove('hide');
        setTimeout(hide, duration || 2500);
      };
    })();
  </script>
  <script type="module">
    import { initCornerSheep, initTransitions } from "./js/sheep.js?v=2329aef";
    initCornerSheep();
    initTransitions();
  </script>
  <script type="module" src="js/main.js?v=2329aef"></script>
</body>
</html>
