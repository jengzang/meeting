  <script type="module">
    import { initAll } from "../js/init.js?v=3708980";
    import { initFullData, records, traffic, recordLocations, recordWeather } from "../js/full/map-main.js";
    import { showLoadingSheep, hideLoadingSheep } from "../js/sheep.js?v=3708980";
    import { finishLoading } from "../js/loading.js?v=3708980";
    import {
      buildCityStats, buildDistrictStats,
      buildWeatherRankings, buildTrafficRankings, buildSummary,
      CONDITION_LABELS
    } from "../js/leaderboard.js";

    initAll({ introTimeout: 2000, finish: false });

    // ── Password flow ──────────────────────────

    const AUTH_KEY = 'full-map-auth';
    const pwOverlay = document.getElementById('pwOverlay');
    const pwInput = document.getElementById('pwInput');
    const pwBtn = document.getElementById('pwBtn');
    const pwError = document.getElementById('pwError');
    let verifying = false;

    async function tryDecrypt(password) {
      if (verifying) return;
      verifying = true;
      pwBtn.disabled = true;
      pwError.textContent = '';
      try {
        showLoadingSheep();
        await initFullData(password);
        hideLoadingSheep();
        sessionStorage.setItem(AUTH_KEY, password);
        pwOverlay.classList.add('hidden');
        finishLoading();
        renderLeaderboard();
      } catch (e) {
        hideLoadingSheep();
        sessionStorage.removeItem(AUTH_KEY);
        pwInput.classList.add('error');
        pwError.textContent = '密码错误';
        setTimeout(() => pwInput.classList.remove('error'), 300);
        pwInput.value = '';
        pwBtn.disabled = false;
        pwInput.focus();
      } finally {
        verifying = false;
      }
    }

    pwBtn.addEventListener('click', () => tryDecrypt(pwInput.value.trim()));
    pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryDecrypt(pwInput.value.trim()); });
    pwInput.addEventListener('input', () => {
      pwError.textContent = '';
      if (pwInput.value.trim().length >= 6) tryDecrypt(pwInput.value.trim());
    });

    const savedPw = sessionStorage.getItem(AUTH_KEY);
    if (savedPw) tryDecrypt(savedPw);

    // ── Rendering (same as public leaderboard) ──

    function renderLeaderboard() {
      const cityStats = buildCityStats(records, recordLocations, recordWeather, traffic);
      const districtStats = buildDistrictStats(records, recordLocations, recordWeather, traffic);
      const weatherRankings = buildWeatherRankings(cityStats);
      const districtWeatherRankings = buildWeatherRankings(districtStats);
      const trafficRankings = buildTrafficRankings(cityStats);
      const summary = buildSummary(cityStats);

      const summaryBar = document.getElementById('summaryBar');
      const mainContent = document.getElementById('mainContent');
      const tabBar = document.getElementById('tabBar');
      tabBar.style.display = 'flex';

      let currentTab = 'city';
      let citySort = { field: 'recordCount', asc: false };
      let districtSort = { field: 'recordCount', asc: false };
      let wxMode = 'city';

      function rankClass(i) { if (i===0) return 'rank-1'; if (i===1) return 'rank-2'; if (i===2) return 'rank-3'; return ''; }
      function rankDotClass(i) { if (i===0) return 'gold'; if (i===1) return 'silver'; if (i===2) return 'bronze'; return ''; }
      function fmtHours(h) { if (h>=24) return (Math.round(h/2.4)/10)+'天'; return h.toFixed(1)+'h'; }
      function fmtTemp(c) { return c!=null ? c.toFixed(1)+'°C' : '--'; }
      function fmtKmh(v) { return v!=null ? v.toFixed(1)+' km/h' : '--'; }
      function fmtMm(v) { return v!=null ? v.toFixed(1)+' mm' : '--'; }
      function fmtM(v) { if (v==null) return '--'; if (v>=1000) return (v/1000).toFixed(1)+' km'; return Math.round(v)+' m'; }
      function fmtPct(v) { return v!=null ? Math.round(v*100)+'%' : '--'; }

      function renderSummary() {
        summaryBar.innerHTML =
          `<span class="summary-item">🏙 <strong>${summary.cityCount}</strong> 城市</span>` +
          `<span class="summary-item">📋 <strong>${summary.totalRecords}</strong> 到访</span>` +
          `<span class="summary-item">⏱ <strong>${fmtHours(summary.totalDurationHours)}</strong></span>` +
          `<span class="summary-item">📍 <strong>${summary.totalPlaces}</strong> 地点</span>`;
      }

      function sortedEntries(stats, sort) {
        return Object.entries(stats).sort((a, b) => {
          let va = a[1][sort.field], vb = b[1][sort.field];
          if (va == null) va = 0;
          if (vb == null) vb = 0;
          if (typeof va === 'string') return sort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
          return sort.asc ? va - vb : vb - va;
        });
      }

      function renderActivityBars(breakdown) {
        const entries = Object.entries(breakdown);
        if (!entries.length) return '<span style="color:var(--muted)">无数据</span>';
        const maxVal = entries[0][1];
        return entries.map(([act, count]) =>
          `<div class="activity-bar-row"><span class="activity-bar-label">${act}</span><div class="activity-bar-track"><div class="activity-bar-fill" style="width:${(count/maxVal*100).toFixed(0)}%"></div></div><span class="activity-bar-count">${count}</span></div>`
        ).join('');
      }

      function renderTrafficTags(breakdown) {
        const entries = Object.entries(breakdown);
        if (!entries.length) return '<span style="color:var(--muted)">无数据</span>';
        return `<div class="traffic-tags">` +
          entries.map(([type, td]) => {
            const c = td.count || td;
            const extra = td.totalHours != null
              ? ` <span class="traffic-tag-meta">${c}次 · ⏱${fmtHours(td.totalHours)} · 均${fmtHours(td.avgHours)}/次 · 最长${fmtHours(td.maxHours)}/次${td.maxHoursPerDay!=null?' · '+'最长' + fmtHours(td.maxHoursPerDay)+'/天':''} · ${td.dayCount}天</span>`
              : ` ${c}次`;
            return `<span class="traffic-tag">${type}${extra}</span>`;
          }).join('') +
          `</div>`;
      }

      function fmtValTime(val, time, fmtFn) {
        if (val == null) return '--';
        return fmtFn(val) + (time ? `<span class="wx-date">${time}</span>` : '');
      }

      function renderWeatherMini(s) {
        const w = s.weather;
        const dr = w.firstWxTime && w.lastWxTime ? `<tr><td>日期范围</td><td colspan="2"><span class="wx-date">${w.firstWxTime} ~ ${w.lastWxTime}</span></td></tr>` : '';
        return `<table class="weather-mini">` +
          `<tr><td>温度</td><td>${fmtValTime(w.tempMin,w.tempMinTime,fmtTemp)} ~ ${fmtValTime(w.tempMax,w.tempMaxTime,fmtTemp)}</td><td>均 ${fmtTemp(w.tempAvg)}</td></tr>` +
          `<tr><td>体感温度</td><td>${fmtValTime(w.feelsLikeMin,w.feelsLikeMinTime,fmtTemp)} ~ ${fmtValTime(w.feelsLikeMax,w.feelsLikeMaxTime,fmtTemp)}</td><td></td></tr>` +
          `<tr><td>湿度</td><td>${fmtValTime(w.humidityMin,w.humidityMinTime,fmtPct)} ~ ${fmtValTime(w.humidityMax,w.humidityMaxTime,fmtPct)}</td><td>均 ${fmtPct(w.humidityAvg)}</td></tr>` +
          `<tr><td>降水</td><td>最大 ${fmtValTime(w.precipMaxMm,w.precipMaxTime,fmtMm)}</td><td>总计 ${fmtMm(w.precipTotalMm)}${w.precipAvgMm!=null?' · 均 '+fmtMm(w.precipAvgMm):''}</td></tr>` +
          `<tr><td>风速</td><td>${fmtValTime(w.windMinKmh,w.windMinTime,fmtKmh)} ~ ${fmtValTime(w.windMaxKmh,w.windMaxTime,fmtKmh)}</td><td>均 ${fmtKmh(w.windAvgKmh)}</td></tr>` +
          `<tr><td>能见度</td><td>最低 ${fmtValTime(w.visibilityMinM,w.visibilityMinTime,fmtM)} · 最高 ${fmtValTime(w.visibilityMaxM,w.visibilityMaxTime,fmtM)}</td><td>均 ${fmtM(w.visibilityAvgM)}</td></tr>` +
          `<tr><td>紫外线</td><td>${w.uvMin!=null?w.uvMin.toFixed(1):'--'}${w.uvMinTime?`<span class="wx-date">${w.uvMinTime}</span>`:''} ~ ${w.uvMax!=null?Math.round(w.uvMax):'--'}${w.uvMaxTime?`<span class="wx-date">${w.uvMaxTime}</span>`:''}</td><td>均 ${w.uvAvg!=null?w.uvAvg.toFixed(1):'--'}</td></tr>` +
          `<tr><td>天气类型</td><td colspan="2">${Object.entries(s.weatherConditionCounts||{}).map(([c,n])=>(CONDITION_LABELS[c]||c)+' '+n).join(' · ')}</td></tr>` +
          dr +
          `</table>`;
      }

      function renderDetail(s) {
        return `<div class="detail-inner">` +
          `<div class="detail-block"><h4>活动分布</h4>${renderActivityBars(s.activityBreakdown)}</div>` +
          `<div class="detail-block"><h4>交通方式</h4>${renderTrafficTags(s.trafficBreakdown)}</div>` +
          `<div class="detail-block"><h4>天气概况${s.weatherEntryCount?' ('+s.weatherEntryCount+'条)':''}</h4>${s.weatherEntryCount?renderWeatherMini(s):'<span style="color:var(--muted)">无天气数据</span>'}</div>` +
          `</div>`;
      }

      function renderTable(stats, sort) {
        const entries = sortedEntries(stats, sort);
        const isDistrict = currentTab === 'district';
        const cols = isDistrict
          ? ['排名','区县','城市','到访次数','总时长','地点数','活动类型']
          : ['排名','城市','省份','到访次数','总时长','地点数','活动类型'];
        const fields = isDistrict
          ? [null,'district','city','recordCount','totalDurationHours','placeCount','activityCount']
          : [null,null,'admin','recordCount','totalDurationHours','placeCount','activityCount'];
        let html = '<table class="rank-table"><thead><tr>';
        html += cols.map((col, i) => {
          const f = fields[i];
          if (!f) return `<th>${col}</th>`;
          const arrow = sort.field === f ? (sort.asc ? ' ↑' : ' ↓') : '';
          return `<th data-sort="${f}">${col}<span class="sort-arrow">${arrow}</span></th>`;
        }).join('');
        html += '<th></th></tr></thead><tbody>';
        let rank = 0;
        for (const [key, s] of entries) {
          rank++;
          const rowId = 'row-' + key.replace(/[\/]/g, '_');
          html += `<tr class="rank-row" data-key="${key}" id="${rowId}">`;
          html += `<td class="rank-num ${rankClass(rank-1)}">#${rank}</td>`;
          if (isDistrict) {
            html += `<td><span class="city-name">${s.district||s.city}</span></td>`;
            html += `<td style="font-size:12px;color:var(--muted)">${s.city}</td>`;
          } else {
            html += `<td><span class="city-name">${key}</span></td>`;
            html += `<td style="font-size:12px;color:var(--muted)">${s.admin}</td>`;
          }
          html += `<td><span class="stat-val">${s.recordCount}</span><span class="stat-unit">次</span></td>`;
          html += `<td><span class="stat-val">${fmtHours(s.totalDurationHours)}</span></td>`;
          html += `<td><span class="stat-val">${s.placeCount}</span><span class="stat-unit">处</span></td>`;
          html += `<td><span class="stat-val">${s.activityCount}</span><span class="stat-unit">类</span></td>`;
          html += `<td style="text-align:right"><span class="expand-arrow">▼</span></td></tr>`;
          html += `<tr class="detail-row" id="detail-${rowId}">`;
          html += `<td colspan="${cols.length+1}" class="detail-cell">${renderDetail(s)}</td></tr>`;
        }
        html += '</tbody></table>';
        return html;
      }

      function bindTableEvents() {
        mainContent.querySelectorAll('th[data-sort]').forEach(th => {
          th.addEventListener('click', () => {
            const f = th.dataset.sort;
            const sortObj = currentTab === 'district' ? districtSort : citySort;
            if (sortObj.field === f) sortObj.asc = !sortObj.asc;
            else { sortObj.field = f; sortObj.asc = false; }
            renderCurrent();
          });
        });
        mainContent.querySelectorAll('.rank-row').forEach(row => {
          row.addEventListener('click', () => {
            const detailRow = document.getElementById('detail-' + row.id);
            if (!detailRow) return;
            const isOpen = detailRow.classList.contains('open');
            mainContent.querySelectorAll('.detail-row.open').forEach(r => r.classList.remove('open'));
            mainContent.querySelectorAll('.rank-row.expanded').forEach(r => r.classList.remove('expanded'));
            detailRow.classList.toggle('open', !isOpen);
            row.classList.toggle('expanded', !isOpen);
          });
        });
      }

      function renderWeatherTab() {
        const rankings = wxMode === 'district' ? districtWeatherRankings : weatherRankings;
        const label = wxMode === 'district' ? '' : '城市';
        const panels = [
          { key:'hottest', title:`🔥 最热${label}`, fmt:v=>fmtTemp(v), get:s=>s.weather.tempMax, getTime:s=>s.weather.tempMaxTime },
          { key:'coldest', title:`❄ 最冷${label}`, fmt:v=>fmtTemp(v), get:s=>s.weather.tempMin, getTime:s=>s.weather.tempMinTime },
          { key:'highestFeelsLike', title:`🥵 最高体感温度`, fmt:v=>fmtTemp(v), get:s=>s.weather.feelsLikeMax, getTime:s=>s.weather.feelsLikeMaxTime },
          { key:'windiest', title:`💨 最大风速`, fmt:v=>fmtKmh(v), get:s=>s.weather.windMaxKmh, getTime:s=>s.weather.windMaxTime },
          { key:'rainiest', title:`🌧 累计最多降雨`, fmt:v=>fmtMm(v), get:s=>s.weather.precipTotalMm, getTime:null },
          { key:'maxPrecip', title:`🌧 单次最大降雨`, fmt:v=>fmtMm(v), get:s=>s.weather.precipMaxMm, getTime:s=>s.weather.precipMaxTime },
          { key:'lowestVisibility', title:`🌫 最低能见度`, fmt:v=>fmtM(v), get:s=>s.weather.visibilityMinM, getTime:s=>s.weather.visibilityMinTime },
          { key:'highestUV', title:`☀ 最高紫外线`, fmt:v=>v!=null?Math.round(v):'--', get:s=>s.weather.uvMax, getTime:s=>s.weather.uvMaxTime },
          { key:'mostHumid', title:`💧 最潮湿`, fmt:v=>fmtPct(v), get:s=>s.weather.humidityAvg, getTime:null },
        ];
        let html = `<div class="wx-toggle-bar"><button class="wx-toggle ${wxMode==='city'?'active':''}" data-wx="city">🏙 城市</button><button class="wx-toggle ${wxMode==='district'?'active':''}" data-wx="district">📍 区县</button></div>`;
        html += '<div class="weather-grid">';
        for (const p of panels) {
          const list = rankings[p.key] || [];
          html += `<div class="wx-card"><h3>${p.title}</h3><ol>`;
          list.forEach(([key, s], i) => {
            const t = p.getTime ? p.getTime(s) : '';
            const name = wxMode === 'district' ? (s.district ? `${s.district} · ${s.city}` : key) : key;
            html += `<li><span class="rank-dot ${rankDotClass(i)}">${i+1}</span><span class="city-label">${name}</span><span class="city-val">${p.fmt(p.get(s))}</span>${t?`<span class="wx-date">${t}</span>`:''}</li>`;
          });
          html += '</ol></div>';
        }
        html += '</div>';
        return html;
      }

      function renderTrafficTab() {
        const types = Object.keys(trafficRankings).sort((a, b) => {
          const tA = trafficRankings[a].reduce((s, e) => s + e.count, 0);
          const tB = trafficRankings[b].reduce((s, e) => s + e.count, 0);
          return tB - tA;
        });
        let html = '<div class="traffic-grid">';
        for (const type of types) {
          const list = trafficRankings[type];
          html += `<div class="traffic-card"><h3>${type}</h3><ol>`;
          list.slice(0, 8).forEach((e, i) => {
            html += `<li><span class="rank-dot ${rankDotClass(i)}">${i+1}</span><span class="city-label">${e.city}</span><span class="city-val">${e.count}<span class="city-unit">次</span></span>` +
              `${e.totalHours ? `<span class="traffic-dur">⏱${fmtHours(e.totalHours)} · 均${fmtHours(e.avgHours)}/次 · 最长${fmtHours(e.maxHours)}/次${e.maxHoursPerDay ? ' · '+'最长' + fmtHours(e.maxHoursPerDay)+'/天' : ''} · ${e.dayCount||0}天</span>` : ''}</li>`;
          });
          html += '</ol></div>';
        }
        html += '</div>';
        return html;
      }

      function renderCurrent() {
        if (currentTab === 'city') {
          mainContent.innerHTML = renderTable(cityStats, citySort);
          bindTableEvents();
        } else if (currentTab === 'district') {
          mainContent.innerHTML = renderTable(districtStats, districtSort);
          bindTableEvents();
        } else if (currentTab === 'weather') {
          mainContent.innerHTML = renderWeatherTab();
        } else if (currentTab === 'traffic') {
          mainContent.innerHTML = renderTrafficTab();
        }
      }

      tabBar.addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        currentTab = btn.dataset.tab;
        tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderCurrent();
      });

      mainContent.addEventListener('click', (e) => {
        const btn = e.target.closest('.wx-toggle');
        if (!btn) return;
        wxMode = btn.dataset.wx;
        renderCurrent();
      });

      renderSummary();
      renderCurrent();
    }
  </script>
</body>
</html>
