<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>热力图</title>

  <style>
    :root {
      --cell-size: 18px;
      --cell-gap: 5px;
      --radius: 4px;

      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.88);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --empty: rgba(148, 163, 184, 0.18);

      --level-1: #6ccf7f;
      --level-2: #40c463;
      --level-3: #30a14e;
      --level-4: #216e39;

      --shape-color: #40c463;
      --glow: rgba(64, 196, 99, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, var(--glow), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    .card {
      width: min(1080px, calc(100vw - 32px));
      padding: 24px;
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    select {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
    }

    .heatmap-wrap {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .calendar {
      display: grid;
      grid-template-columns: 34px max-content;
      gap: 10px;
      width: max-content;
    }

    .month-row {
      grid-column: 2;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell-size);
      gap: var(--cell-gap);
      height: 20px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .month-label {
      transform: translateX(-2px);
    }

    .weekday-col {
      grid-column: 1;
      display: grid;
      grid-template-rows: repeat(7, var(--cell-size));
      gap: var(--cell-gap);
      font-size: 12px;
      color: var(--muted);
      align-items: center;
    }

    .week-grid {
      grid-column: 2;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--cell-size);
      gap: var(--cell-gap);
    }

    .week {
      display: grid;
      grid-template-rows: repeat(7, var(--cell-size));
      gap: var(--cell-gap);
    }

    .cell {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: var(--radius);
      background: var(--empty);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .cell:hover {
      transform: scale(1.35);
      z-index: 10;
      box-shadow:
        0 0 16px var(--glow),
        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .fill {
      position: absolute;
      left: 0;
      right: 0;
      background: var(--shape-color);
      box-shadow: 0 0 12px var(--glow);
    }

    .shape-full .fill {
      top: 0;
      bottom: 0;
    }

    .shape-top .fill {
      top: 0;
      height: 50%;
    }

    .shape-bottom .fill {
      bottom: 0;
      height: 50%;
    }

    .shape-middle .fill {
      top: 25%;
      height: 50%;
    }

    .level-1 { background: var(--level-1); }
    .level-2 { background: var(--level-2); }
    .level-3 { background: var(--level-3); }
    .level-4 { background: var(--level-4); }

    .legend {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .legend-box {
      width: var(--cell-size);
      height: var(--cell-size);
      border-radius: var(--radius);
      background: var(--empty);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .legend-box.l1 { background: var(--level-1); }
    .legend-box.l2 { background: var(--level-2); }
    .legend-box.l3 { background: var(--level-3); }
    .legend-box.l4 { background: var(--level-4); }

    .month-ratio {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .month-ratio-title,
    .pie-section-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .month-ratio-item {
      display: grid;
      grid-template-columns: 48px 1fr 88px;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .month-ratio-bar {
      height: 10px;
      border-radius: 999px;
      background: var(--empty);
      overflow: hidden;
    }

    .month-ratio-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--level-2), var(--level-4));
      box-shadow: 0 0 12px var(--glow);
    }

    .month-ratio-value {
      text-align: right;
      white-space: nowrap;
    }

    .total-pie-section,
    .monthly-pie-section {
      margin-top: 24px;
    }

    .total-pie-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 24px;
      align-items: center;
    }

    .pie-wrap {
      perspective: 700px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 160px;
    }

    .pie-3d {
      position: relative;
      border-radius: 50%;
      background: var(--pie-gradient);
      transform: rotateX(58deg);
      transform-style: preserve-3d;
      box-shadow:
        0 24px 32px rgba(0, 0, 0, 0.28),
        0 0 18px var(--glow);
    }

    .pie-3d::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--pie-gradient);
      transform: translateZ(-20px);
      filter: brightness(0.55);
    }

    .pie-3d::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      box-shadow:
        inset 0 12px 16px rgba(255, 255, 255, 0.16),
        inset 0 -18px 22px rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }

    .pie-large {
      width: 180px;
      height: 180px;
    }

    .pie-small {
      width: 112px;
      height: 112px;
    }

    .total-pie-legend {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .total-pie-legend-item {
      display: grid;
      grid-template-columns: 14px 46px 1fr 58px;
      align-items: center;
      gap: 8px;
    }

    .pie-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: var(--dot-color);
      box-shadow: 0 0 10px var(--dot-color);
    }

    .pie-value {
      text-align: right;
      white-space: nowrap;
    }

    .monthly-pie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }

    .monthly-pie-card {
      padding: 14px 12px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .monthly-pie-name {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }

    .monthly-pie-info {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .monthly-pie-percent {
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
    }

    .monthly-pie-mini-legend {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .monthly-pie-mini-legend span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .monthly-pie-mini-legend span::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 2px;
      background: var(--dot-color);
    }

    @media (max-width: 600px) {
      :root {
        --cell-size: 15px;
        --cell-gap: 4px;
      }

      .card {
        padding: 18px;
      }

      .month-ratio-item {
        grid-template-columns: 42px 1fr 78px;
      }

      .total-pie-layout {
        grid-template-columns: 1fr;
      }

      .monthly-pie-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pie-large {
        width: 160px;
        height: 160px;
      }

      .pie-small {
        width: 96px;
        height: 96px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <div>
        <div class="title">热力图</div>
        <div class="subtitle">2026.02.16 — 2026.06.14；一周一列，周一到周日。</div>
      </div>

      <div class="controls">
        <select id="modeSelect">
          <option value="shape">模式 1：形状填充</option>
          <option value="depth">模式 2：颜色深度</option>
        </select>

        <select id="themeSelect">
          <option value="githubGreen">GitHub 绿</option>
          <option value="oceanBlue">海洋蓝</option>
          <option value="cyberCyan">炫酷青</option>
          <option value="warmOrange">温暖橙</option>
          <option value="rosePink">玫瑰粉</option>
          <option value="violetPurple">紫罗兰</option>
        </select>
      </div>
    </div>

    <div class="heatmap-wrap">
      <div id="calendar" class="calendar"></div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="month-ratio" id="monthRatio"></div>

    <div class="total-pie-section" id="totalPieSection"></div>

    <div class="monthly-pie-section" id="monthlyPieSection"></div>
  </div>

  <script>
    const YEAR = 2026;

    const START_DATE = "2026-02-16";
    const END_DATE = "2026-06-14";

    let currentMode = "shape";

    let currentTheme = "githubGreen";

    const SHAPE_INPUT = {
      top: [
        "5.5", "5.19", "6.10"
      ],

      middle: [
        "2.17", "4.6", "5.1"
      ],

      bottom: [
        "2.16", "2.22", "3.6", "3.13", "3.20",
        "5.14", "5.22", "5.27"
      ],

      full: [
        "2.21", "2.26",
        "3.7", "3.8", "3.14", "3.15", "3.16", "3.21",
        "4.4", "4.5", "4.18", "4.19", "4.20",
        "5.2", "5.3", "5.4",
        "5.15", "5.16", "5.17", "5.18",
        "5.23", "5.24",
        ...rangeMD("5.28", "6.9")
      ]
    };

    const DEPTH_INPUT = {
      4: [
        "3.7", "3.8", "3.14", "3.15", "3.16", "3.21",
        "4.4", "4.5", "4.18", "4.19", "4.20",
        "5.15", "5.16", "5.17", "5.18",
        "5.23", "5.24",
        ...rangeMD("5.28", "6.9")
      ],

      3: [
        "2.26",
        "3.6", "3.13", "3.20",
        "5.14", "5.22", "5.27",
        ...rangeMD("5.2", "5.4")
      ],

      2: [
        "2.21", "5.1", "5.5", "5.19", "6.10"
      ],

      1: [
        "2.16", "2.17", "2.22", "4.6"
      ]
    };

    const themes = {
      githubGreen: {
        "--bg": "#0d1117",
        "--panel": "rgba(22, 27, 34, 0.92)",
        "--text": "#e6edf3",
        "--muted": "#8b949e",
        "--empty": "#21262d",
        "--level-1": "#6ccf7f",
        "--level-2": "#40c463",
        "--level-3": "#30a14e",
        "--level-4": "#216e39",
        "--shape-color": "#40c463",
        "--glow": "rgba(64, 196, 99, 0.42)"
      },

      oceanBlue: {
        "--bg": "#061327",
        "--panel": "rgba(8, 24, 52, 0.9)",
        "--text": "#eaf4ff",
        "--muted": "#8fb8e8",
        "--empty": "rgba(96, 165, 250, 0.14)",
        "--level-1": "#60a5fa",
        "--level-2": "#3b82f6",
        "--level-3": "#2563eb",
        "--level-4": "#1e40af",
        "--shape-color": "#3b82f6",
        "--glow": "rgba(59, 130, 246, 0.45)"
      },

      cyberCyan: {
        "--bg": "#020617",
        "--panel": "rgba(15, 23, 42, 0.9)",
        "--text": "#ecfeff",
        "--muted": "#67e8f9",
        "--empty": "rgba(103, 232, 249, 0.14)",
        "--level-1": "#67e8f9",
        "--level-2": "#22d3ee",
        "--level-3": "#06b6d4",
        "--level-4": "#0e7490",
        "--shape-color": "#22d3ee",
        "--glow": "rgba(34, 211, 238, 0.45)"
      },

      warmOrange: {
        "--bg": "#1c1208",
        "--panel": "rgba(67, 36, 13, 0.84)",
        "--text": "#fff7ed",
        "--muted": "#fed7aa",
        "--empty": "rgba(253, 186, 116, 0.18)",
        "--level-1": "#fdba74",
        "--level-2": "#fb923c",
        "--level-3": "#f97316",
        "--level-4": "#c2410c",
        "--shape-color": "#fb923c",
        "--glow": "rgba(251, 146, 60, 0.45)"
      },

      rosePink: {
        "--bg": "#1f0712",
        "--panel": "rgba(76, 5, 25, 0.84)",
        "--text": "#fff1f2",
        "--muted": "#fda4af",
        "--empty": "rgba(253, 164, 175, 0.16)",
        "--level-1": "#fda4af",
        "--level-2": "#fb7185",
        "--level-3": "#f43f5e",
        "--level-4": "#be123c",
        "--shape-color": "#fb7185",
        "--glow": "rgba(251, 113, 133, 0.42)"
      },

      violetPurple: {
        "--bg": "#140821",
        "--panel": "rgba(35, 15, 65, 0.86)",
        "--text": "#faf5ff",
        "--muted": "#c4b5fd",
        "--empty": "rgba(196, 181, 253, 0.16)",
        "--level-1": "#c4b5fd",
        "--level-2": "#a78bfa",
        "--level-3": "#8b5cf6",
        "--level-4": "#6d28d9",
        "--shape-color": "#a78bfa",
        "--glow": "rgba(167, 139, 250, 0.42)"
      }
    };

    const calendarEl = document.getElementById("calendar");
    const legendEl = document.getElementById("legend");
    const monthRatioEl = document.getElementById("monthRatio");
    const totalPieSectionEl = document.getElementById("totalPieSection");
    const monthlyPieSectionEl = document.getElementById("monthlyPieSection");
    const modeSelect = document.getElementById("modeSelect");
    const themeSelect = document.getElementById("themeSelect");

    modeSelect.value = currentMode;
    themeSelect.value = currentTheme;

    const shapeData = buildShapeData(SHAPE_INPUT);
    const depthData = buildDepthData(DEPTH_INPUT);

    function mdToDateStr(md) {
      const [month, day] = md.split(".").map(Number);
      return `${YEAR}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function rangeMD(startMD, endMD) {
      const result = [];
      let current = parseDate(mdToDateStr(startMD));
      const end = parseDate(mdToDateStr(endMD));

      while (current <= end) {
        result.push(`${current.getMonth() + 1}.${current.getDate()}`);
        current = addDays(current, 1);
      }

      return result;
    }

    function buildShapeData(input) {
      const result = {};

      Object.entries(input).forEach(([shape, dateList]) => {
        dateList.forEach(md => {
          result[mdToDateStr(md)] = shape;
        });
      });

      return result;
    }

    function buildDepthData(input) {
      const result = {};

      Object.entries(input).forEach(([level, dateList]) => {
        dateList.forEach(md => {
          result[mdToDateStr(md)] = Number(level);
        });
      });

      return result;
    }

    function parseDate(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function getMonday(date) {
      const result = new Date(date);
      const day = result.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      result.setDate(result.getDate() + diff);
      return result;
    }

    function getMonthText(date) {
      return `${date.getMonth() + 1}月`;
    }

    function buildWeeks(startDate, endDate) {
      const firstMonday = getMonday(startDate);
      const weeks = [];
      let cursor = new Date(firstMonday);

      while (cursor <= endDate || cursor <= getMonday(endDate)) {
        const week = [];

        for (let i = 0; i < 7; i++) {
          week.push(addDays(cursor, i));
        }

        weeks.push(week);
        cursor = addDays(cursor, 7);
      }

      return weeks;
    }

    function applyTheme(themeName) {
      const theme = themes[themeName];

      Object.entries(theme).forEach(([key, value]) => {
        document.documentElement.style.setProperty(key, value);
      });
    }

    function renderCalendar() {
      const startDate = parseDate(START_DATE);
      const endDate = parseDate(END_DATE);
      const weeks = buildWeeks(startDate, endDate);

      calendarEl.innerHTML = "";

      const monthRow = document.createElement("div");
      monthRow.className = "month-row";

      let lastMonth = null;

      weeks.forEach((week) => {
        const firstDayInRange = week.find(day => day >= startDate && day <= endDate);
        const monthCell = document.createElement("div");

        if (firstDayInRange && firstDayInRange.getMonth() !== lastMonth) {
          monthCell.className = "month-label";
          monthCell.textContent = getMonthText(firstDayInRange);
          lastMonth = firstDayInRange.getMonth();
        }

        monthRow.appendChild(monthCell);
      });

      const weekdayCol = document.createElement("div");
      weekdayCol.className = "weekday-col";

      ["一", "二", "三", "四", "五", "六", "日"].forEach(day => {
        const div = document.createElement("div");
        div.textContent = day;
        weekdayCol.appendChild(div);
      });

      const weekGrid = document.createElement("div");
      weekGrid.className = "week-grid";

      weeks.forEach(week => {
        const weekCol = document.createElement("div");
        weekCol.className = "week";

        week.forEach(date => {
          const dateStr = formatDate(date);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.title = dateStr;

          if (date < startDate || date > endDate) {
            cell.style.visibility = "hidden";
          } else {
            if (currentMode === "shape") {
              const shape = shapeData[dateStr];

              if (shape) {
                cell.classList.add(`shape-${shape}`);

                const fill = document.createElement("div");
                fill.className = "fill";
                cell.appendChild(fill);

                cell.title = `${dateStr}：${shapeToText(shape)}`;
              }
            }

            if (currentMode === "depth") {
              const level = depthData[dateStr];

              if (level) {
                cell.classList.add(`level-${level}`);
                cell.title = `${dateStr}：${levelToText(level)}`;
              }
            }
          }

          weekCol.appendChild(cell);
        });

        weekGrid.appendChild(weekCol);
      });

      calendarEl.appendChild(monthRow);
      calendarEl.appendChild(weekdayCol);
      calendarEl.appendChild(weekGrid);

      renderLegend();
      renderMonthRatio();
      renderTotalPie();
      renderMonthlyPies();
    }

    function shapeToText(shape) {
      const map = {
        full: "全满",
        top: "上半",
        middle: "中间",
        bottom: "下半"
      };

      return map[shape] || shape;
    }

    function levelToText(level) {
      const map = {
        1: "最浅",
        2: "次浅",
        3: "次深",
        4: "最深"
      };

      return map[level] || `等级 ${level}`;
    }

    function renderLegend() {
      if (currentMode === "shape") {
        legendEl.innerHTML = `
          <span>形状：</span>
          <span class="legend-box" style="background: var(--shape-color);"></span><span>全满</span>
          <span class="legend-box" style="background: linear-gradient(to bottom, var(--shape-color) 50%, var(--empty) 50%);"></span><span>上半</span>
          <span class="legend-box" style="background: linear-gradient(to bottom, var(--empty) 25%, var(--shape-color) 25%, var(--shape-color) 75%, var(--empty) 75%);"></span><span>中间</span>
          <span class="legend-box" style="background: linear-gradient(to top, var(--shape-color) 50%, var(--empty) 50%);"></span><span>下半</span>
        `;
      } else {
        legendEl.innerHTML = `
          <span>颜色深度：</span>
          <span>最浅</span>
          <span class="legend-box l1"></span>
          <span class="legend-box l2"></span>
          <span class="legend-box l3"></span>
          <span class="legend-box l4"></span>
          <span>最深</span>
        `;
      }
    }

    function renderMonthRatio() {
      const startDate = parseDate(START_DATE);
      const endDate = parseDate(END_DATE);
      const paintedData = currentMode === "shape" ? shapeData : depthData;

      const monthStats = getMonthStats(startDate, endDate, paintedData);

      monthRatioEl.innerHTML = `
        <div class="month-ratio-title">每月占比柱状图</div>
        ${monthStats.map(item => `
          <div class="month-ratio-item">
            <div>${item.label}</div>
            <div class="month-ratio-bar">
              <div class="month-ratio-fill" style="width: ${item.percent}%;"></div>
            </div>
            <div class="month-ratio-value">${item.filled}/${item.total} · ${item.percent}%</div>
          </div>
        `).join("")}
      `;
    }

    function renderTotalPie() {
      const startDate = parseDate(START_DATE);
      const endDate = parseDate(END_DATE);
      const paintedData = currentMode === "shape" ? shapeData : depthData;

      const monthStats = getMonthStats(startDate, endDate, paintedData)
        .filter(item => item.filled > 0);

      const totalFilled = monthStats.reduce((sum, item) => sum + item.filled, 0);

      if (totalFilled === 0) {
        totalPieSectionEl.innerHTML = `
          <div class="pie-section-title">总构成饼图</div>
          <div class="total-pie-legend">暂无涂色数据</div>
        `;
        return;
      }

      const pieColors = [
        "var(--level-1)",
        "var(--level-2)",
        "var(--level-3)",
        "var(--level-4)",
        "var(--shape-color)"
      ];

      let currentDeg = 0;

      const gradientParts = monthStats.map((item, index) => {
        const startDeg = currentDeg;
        const angle = item.filled / totalFilled * 360;
        const endDeg = currentDeg + angle;
        currentDeg = endDeg;

        return `${pieColors[index % pieColors.length]} ${startDeg}deg ${endDeg}deg`;
      });

      const pieGradient = `conic-gradient(${gradientParts.join(", ")})`;

      totalPieSectionEl.innerHTML = `
        <div class="pie-section-title">总构成饼图</div>

        <div class="total-pie-layout">
          <div class="pie-wrap">
            <div class="pie-3d pie-large" style="--pie-gradient: ${pieGradient};"></div>
          </div>

          <div class="total-pie-legend">
            ${monthStats.map((item, index) => {
              const percent = Math.round(item.filled / totalFilled * 100);

              return `
                <div class="total-pie-legend-item">
                  <span class="pie-dot" style="--dot-color: ${pieColors[index % pieColors.length]};"></span>
                  <span>${item.label}</span>
                  <span>${item.filled} 天</span>
                  <span class="pie-value">${percent}%</span>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderMonthlyPies() {
      const startDate = parseDate(START_DATE);
      const endDate = parseDate(END_DATE);
      const paintedData = currentMode === "shape" ? shapeData : depthData;

      const monthStats = getMonthStats(startDate, endDate, paintedData);

      monthlyPieSectionEl.innerHTML = `
        <div class="pie-section-title">每月占比饼图</div>

        <div class="monthly-pie-grid">
          ${monthStats.map(item => {
            const filledDeg = item.total === 0 ? 0 : item.filled / item.total * 360;
            const percent = item.total === 0 ? 0 : Math.round(item.filled / item.total * 100);
            const emptyDays = item.total - item.filled;

            const pieGradient = `
              conic-gradient(
                var(--level-4) 0deg ${filledDeg}deg,
                var(--empty) ${filledDeg}deg 360deg
              )
            `;

            return `
              <div class="monthly-pie-card">
                <div class="monthly-pie-name">${item.label}</div>

                <div class="pie-wrap">
                  <div class="pie-3d pie-small" style="--pie-gradient: ${pieGradient};"></div>
                </div>

                <div class="monthly-pie-info">
                  <div class="monthly-pie-percent">${percent}%</div>
                  <div>${item.filled}/${item.total} 天</div>
                </div>

                <div class="monthly-pie-mini-legend">
                  <span style="--dot-color: var(--level-4);">已涂色 ${item.filled}</span>
                  <span style="--dot-color: var(--empty);">未涂色 ${emptyDays}</span>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function getMonthStats(startDate, endDate, paintedData) {
      const stats = [];

      let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);

      while (cursor <= endDate) {
        const year = cursor.getFullYear();
        const month = cursor.getMonth();

        const monthStart = new Date(year, month, 1);
        const monthEnd = new Date(year, month + 1, 0);

        const actualStart = monthStart < startDate ? startDate : monthStart;
        const actualEnd = monthEnd > endDate ? endDate : monthEnd;

        let total = 0;
        let filled = 0;

        let day = new Date(actualStart);

        while (day <= actualEnd) {
          const dateStr = formatDate(day);

          total++;

          if (paintedData[dateStr]) {
            filled++;
          }

          day = addDays(day, 1);
        }

        const percent = total === 0 ? 0 : Math.round((filled / total) * 100);

        stats.push({
          label: `${month + 1}月`,
          total,
          filled,
          percent
        });

        cursor = new Date(year, month + 1, 1);
      }

      return stats;
    }

    modeSelect.addEventListener("change", e => {
      currentMode = e.target.value;
      renderCalendar();
    });

    themeSelect.addEventListener("change", e => {
      currentTheme = e.target.value;
      applyTheme(currentTheme);
      renderCalendar();
    });

    applyTheme(currentTheme);
    renderCalendar();
  </script>
</body>
</html>
