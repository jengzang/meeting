  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f48fb1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a1f2b;
    }

    .heart-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      color: rgba(255, 90, 140, 0.35);
      animation: floatHeart 8s linear infinite;
      font-size: 20px;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(110vh) scale(0.8) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: 1; }
      100% {
        transform: translateY(-20vh) scale(1.4) rotate(360deg);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 430px);
      min-height: 520px;
      padding: 34px 22px 28px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow:
        0 24px 70px rgba(255, 90, 140, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      text-align: center;
    }

    .emoji {
      font-size: 58px;
      line-height: 1;
      margin-bottom: 16px;
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #39202b;
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 320px;
      line-height: 1.7;
      font-size: 15px;
      color: rgba(58, 31, 43, 0.72);
    }

    .scene-switcher {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
      padding: 0 8px;
    }
    .scene-pill {
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 95, 135, 0.25);
      background: rgba(255, 255, 255, 0.4);
      color: rgba(58, 31, 43, 0.6);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .scene-pill:hover {
      background: rgba(255, 95, 135, 0.12);
      color: #ff5f8f;
    }
    .scene-pill.active {
      background: linear-gradient(135deg, #ff5f8f, #ff8bb0);
      color: white;
      border-color: transparent;
    }

    .button-area {
      position: relative;
      width: 100%;
      height: 230px;
      margin-top: 34px;
    }

    .btn {
      position: absolute;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 700;
      transition:
        transform 0.28s ease,
        left 0.28s ease,
        top 0.28s ease,
        opacity 0.28s ease,
        box-shadow 0.28s ease;
      user-select: none;
      white-space: nowrap;
    }

    .btn:active {
      transform: scale(0.95);
    }

    #noBtn {
      left: 35px;
      top: 52px;
      color: #ff4f7b;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 95, 135, 0.28);
      box-shadow: 0 12px 26px rgba(255, 95, 135, 0.18);
    }

    #yesBtn {
      right: 35px;
      top: 52px;
      color: white;
      background: linear-gradient(135deg, #ff5f8f, #ff8bb0);
      box-shadow: 0 14px 34px rgba(255, 80, 135, 0.38);
      z-index: 2;
    }

    .tip {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 100%;
      font-size: 14px;
      color: rgba(58, 31, 43, 0.58);
    }

    .success-mask {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(255, 220, 235, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .success-box {
      width: min(90vw, 420px);
      max-width: calc(100vw - 48px);
      max-height: 80vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 34px 24px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.86);
      box-shadow: 0 24px 80px rgba(255, 80, 135, 0.28);
      text-align: center;
      animation: pop 0.38s ease;
    }

    @keyframes pop {
      from { transform: scale(0.82); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-box .big {
      font-size: 64px;
      margin-bottom: 14px;
    }

    .success-box h2 {
      margin: 0;
      font-size: 26px;
      color: #3a1f2b;
    }

    .success-box p {
      margin: 14px 0 24px;
      line-height: 1.8;
      color: rgba(58, 31, 43, 0.72);
    }

    .again-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 24px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff5f8f, #ff8bb0);
      box-shadow: 0 12px 28px rgba(255, 80, 135, 0.34);
      cursor: pointer;
    }

    .corner-home {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 5;
      width: 40px;
      height: 40px;
      opacity: 0.5;
      transition: opacity 0.3s, transform 0.3s;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .corner-home:hover {
      opacity: 0.85;
      transform: scale(1.15);
    }
    .corner-home svg {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 420px) {
      .card { min-height: 440px; padding: 28px 16px 22px; }
      h1 { font-size: 23px; }
      .subtitle { font-size: 14px; max-width: 280px; }
      .btn { font-size: 16px; padding: 12px 18px; }
      .button-area { height: 200px; margin-top: 24px; }
      #noBtn { left: 10px; top: 42px; }
      #yesBtn { right: 10px; top: 42px; }
      .tip { font-size: 13px; bottom: 6px; }
      .success-box { padding: 28px 18px; }
      .success-box .big { font-size: 52px; }
      .success-box h2 { font-size: 22px; }
    }

    @media (max-width: 360px) {
      body { overflow-y: auto; align-items: flex-start; padding-top: 12px; }
      .card { min-height: 420px; padding: 24px 12px 18px; border-radius: 24px; }
      h1 { font-size: 21px; }
      .subtitle { font-size: 13px; }
      .emoji { font-size: 48px; margin-bottom: 10px; }
      .scene-pill { padding: 5px 10px; font-size: 12px; }
      .scene-switcher { gap: 6px; margin-top: 14px; }
      .button-area { height: 180px; margin-top: 18px; }
      .btn { font-size: 15px; padding: 11px 16px; }
      #noBtn { left: 6px; top: 36px; }
      #yesBtn { right: 6px; top: 36px; }
      .tip { font-size: 12px; bottom: 2px; }
      .success-mask { padding: 16px; }
      .success-box { padding: 24px 14px; border-radius: 24px; }
      .success-box .big { font-size: 44px; margin-bottom: 10px; }
      .success-box h2 { font-size: 20px; }
    }
  </style>
</head>

  <script>

      touch: {

        yesTexts: ["有点","好吧","呜呜","有被戳到","不错","用心了","纸巾","呜呜呜"],
        tips: ["提示：诚实一点嘛","感觉到了吧","右边按钮懂你","偷偷感动了吧","嘿嘿"],
        successTitle: "🥲 呜呜呜！",

      },
      ignore: {

        question: "绵羊怎么不回我？",
        subtitle: "发了好几条了你都没反应，在忙啥呢？回一下呗～",
        noText: "不回",
        yesText: "回你",
        emojis: ["😤","😒","😑","😏","😊","😄","💕"],
        noTexts: ["不回","忙着","等一下","没看到","不想回","烦","再说","哼"],
        yesTexts: ["回你","好了","看到了","在呢","说吧","听着","回了","来啦"],
        tips: ["提示：回一下嘛","看到了就回呗","右边按钮秒回","别装死了","快点","嘿嘿"],
        successTitle: "💬 终于回了！",
        successMsg: "可算回我了！<br>下次别已读不回了啊～"
      }
    };

    var question = document.getElementById("question");
    var subtitle = document.getElementById("subtitle");
    var noBtn = document.getElementById("noBtn");
    var yesBtn = document.getElementById("yesBtn");
    var buttonArea = document.getElementById("buttonArea");
    var tip = document.getElementById("tip");
    var emoji = document.getElementById("emoji");
    var successMask = document.getElementById("successMask");
    var successTitle = document.getElementById("successTitle");
    var successMsg = document.getElementById("successMsg");
    var heartBg = document.getElementById("heartBg");
    var sceneSwitcher = document.getElementById("sceneSwitcher");

    var currentScene = "eat";
    var config = SCENES[currentScene];
    var noClickCount = 0;
    var yesClickCount = 0;
    var noScale = 1;
    var yesScale = 1;

    function buildSceneSwitcher() {
      sceneSwitcher.innerHTML = "";
      Object.keys(SCENES).forEach(function(key) {
        var pill = document.createElement("button");
        pill.className = "scene-pill" + (key === currentScene ? " active" : "");
        pill.textContent = SCENES[key].label;
        pill.addEventListener("click", function() { switchScene(key); });
        sceneSwitcher.appendChild(pill);
      });
    }

    function switchScene(key) {
      if (key === currentScene) return;
      currentScene = key;
      config = SCENES[key];
      resetGame();
      buildSceneSwitcher();
    }

    function resetGame() {
      noClickCount = 0;
      yesClickCount = 0;
      noScale = 1;
      yesScale = 1;

      question.textContent = config.question;
      subtitle.textContent = config.subtitle;
      emoji.textContent = config.emojis[0];
      noBtn.textContent = config.noText;
      yesBtn.textContent = config.yesText;

      noBtn.style.transform = "scale(1)";
      noBtn.style.opacity = "1";
      noBtn.style.left = "";
      noBtn.style.top = "";
      yesBtn.style.transform = "scale(1)";
      yesBtn.style.right = "";
      yesBtn.style.top = "";
      tip.textContent = config.tips[0];

      successMask.style.display = "none";
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function moveNoButton() {
      var areaRect = buttonArea.getBoundingClientRect();
      var btnRect = noBtn.getBoundingClientRect();
      var maxLeft = areaRect.width - btnRect.width - 10;
      var maxTop = areaRect.height - btnRect.height - 45;
      var left = randomBetween(8, Math.max(8, maxLeft));
      var top = randomBetween(8, Math.max(8, maxTop));
      noBtn.style.left = left + "px";
      noBtn.style.top = top + "px";
    }

    function updateTip() {
      tip.textContent = config.tips[Math.min(yesClickCount, config.tips.length - 1)];
    }

    function showSuccess() {
      successTitle.textContent = config.successTitle;
      successMsg.innerHTML = config.successMsg;
      successMask.style.display = "flex";
      createBurstHearts();
    }

    noBtn.addEventListener("click", function() {
      noClickCount++;
      noScale = Math.max(0.38, noScale - 0.1);
      yesScale = Math.min(3.3, yesScale + 0.18);

      noBtn.textContent = config.noTexts[noClickCount % config.noTexts.length];
      yesBtn.textContent = config.yesTexts[noClickCount % config.yesTexts.length];
      emoji.textContent = config.emojis[Math.min(noClickCount, config.emojis.length - 1)];

      noBtn.style.transform = "scale(" + noScale + ")";
      yesBtn.style.transform = "scale(" + yesScale + ")";
      if (noScale <= 0.45) noBtn.style.opacity = "0.35";

      moveNoButton();
      updateTip();
    });

    yesBtn.addEventListener("click", function() {
      yesClickCount++;
      yesScale = Math.min(5.2, yesScale + 0.38);
      noScale = Math.max(0.25, noScale - 0.08);

      yesBtn.textContent = config.yesTexts[yesClickCount % config.yesTexts.length];
      yesBtn.style.transform = "scale(" + yesScale + ")";
      noBtn.style.transform = "scale(" + noScale + ")";
      emoji.textContent = config.emojis[Math.min(yesClickCount + 4, config.emojis.length - 1)];

      updateTip();
      if (yesClickCount >= 6) showSuccess();
    });

    noBtn.addEventListener("mouseenter", function() {
      if (window.innerWidth > 768) moveNoButton();
    });

    function createFloatingHearts() {
      for (var i = 0; i < 18; i++) {
        var heart = document.createElement("div");
        heart.className = "heart";
        heart.textContent = ["🎁", "🎀", "✨", "🎁"][i % 4];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDelay = Math.random() * 8 + "s";
        heart.style.animationDuration = randomBetween(6, 11) + "s";
        heart.style.fontSize = randomBetween(16, 32) + "px";
        heartBg.appendChild(heart);
      }
    }

    function createBurstHearts() {
      for (var i = 0; i < 30; i++) {
        var heart = document.createElement("div");
        heart.textContent = "🎁";
        heart.style.position = "fixed";
        heart.style.left = "50%";
        heart.style.top = "50%";
        heart.style.zIndex = "20";
        heart.style.pointerEvents = "none";
        heart.style.fontSize = randomBetween(18, 34) + "px";

        var x = randomBetween(-180, 180);
        var y = randomBetween(-220, 120);
        var rot = randomBetween(-180, 180);

        heart.animate([
          { transform: "translate(-50%, -50%) scale(0.4) rotate(0deg)", opacity: 1 },
          { transform: "translate(calc(-50% + " + x + "px), calc(-50% + " + y + "px)) scale(1.5) rotate(" + rot + "deg)", opacity: 0 }
        ], {
          duration: randomBetween(900, 1500),
          easing: "ease-out",
          fill: "forwards"
        });

        document.body.appendChild(heart);
        setTimeout(function() { heart.remove(); }, 1600);
      }
    }

    buildSceneSwitcher();
    resetGame();
    createFloatingHearts();
  </script>
</body>
</html>
