  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Background stars ────────────────────────────── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    /* ── Main content ────────────────────────────────── */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 24px;
    }

    /* ── Hero sheep ──────────────────────────────────── */
    .hero-sheep-wrap {
      position: relative;
      width: 180px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-sheep {
      width: 160px;
      height: 176px;
      animation: heroFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
    }
    @keyframes heroFloat {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-14px); }
      60% { transform: translateY(-6px); }
    }

    /* ── Title ───────────────────────────────────────── */
    .title-zh {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #f0e6d3 0%, #c8b8a0 40%, #e8d5c0 70%, #f5efe0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 2px 8px rgba(200,180,150,0.3));
    }
    .title-en {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: #94a3b8;
      text-transform: uppercase;
      margin-top: -12px;
    }

    /* ── Divider ─────────────────────────────────────── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148,163,184,0.4), transparent);
    }

    /* ── Nav cards ───────────────────────────────────── */
    .nav-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .nav-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      border-radius: 16px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: #e5e7eb;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      white-space: nowrap;
    }
    .nav-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 0.3s;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 70%);
    }
    .nav-card:hover {
      transform: translateY(-3px) scale(1.03);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .nav-card:hover::before { opacity: 1; }
    .nav-card:active { transform: scale(0.96); }
    .nav-card .icon {
      font-size: 28px;
      line-height: 1;
    }
    .nav-card .label {
      display: flex;
      flex-direction: column;
    }
    .nav-card .sub {
      font-size: 11px;
      font-weight: 400;
      color: #94a3b8;
      letter-spacing: 0.06em;
    }

    /* ── Floating mini sheep ─────────────────────────── */
    .floater {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
      animation: driftUp var(--drift-dur) linear infinite;
      animation-delay: var(--drift-delay);
    }
    .floater svg {
      width: var(--sz);
      height: auto;
    }
    @keyframes driftUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.08; }
      90% { opacity: 0.08; }
      100% { transform: translateY(-110dvh) rotate(var(--rot)); opacity: 0; }
    }

    /* ── Corner gift link ──────────────────────────── */
    .corner-gift {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 24px;
      background: rgba(30, 41, 59, 0.75);
      border: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      color: #e5e7eb;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.25s;
      white-space: nowrap;
    }
    .corner-gift:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.4);
      transform: translateY(-2px);
    }
    .corner-gift .gift-emoji {
      font-size: 18px;
      line-height: 1;
    }

    @media (max-width: 768px) {
      .corner-gift {
        bottom: 14px;
        left: 14px;
        padding: 6px 12px;
        font-size: 12px;
        gap: 4px;
      }
      .corner-gift .gift-emoji {
        font-size: 16px;
      }
    }

    /* ── Page nav loading overlay ────────────────── */
    .page-loading-overlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#0f172a;opacity:1;transition:opacity .35s ease-out}
    .page-loading-overlay.hidden{opacity:0;pointer-events:none}
    .page-loading-overlay.removed{display:none}
    .page-loading-sheep{width:100px;height:110px;animation:ld-bounce .55s ease-in-out infinite alternate}
    .page-loading-text{color:#94a3b8;font-size:13px;font-weight:600;letter-spacing:.05em}
    .page-loading-dots{display:inline-block;width:20px;text-align:left}
    @keyframes ld-bounce{0%{transform:translateY(0) scaleY(1)}80%{transform:translateY(-18px) scaleY(.92)}100%{transform:translateY(-22px) scaleY(1.06)}}
  </style>
